<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 그룹 정보 실시간 확인</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; word-break: break-all; }
        h1 { color: #333; font-size: 20px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; margin: 5px 0; }
        .tag { display: inline-block; background: #e8eaf6; color: #283593; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 10px;}
        pre { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; font-size: 13px; overflow-x: auto; white-space: pre-wrap; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card" id="store-card">
        <p>데이터를 불러오는 중...</p>
    </div>

    <script>
        const api_url = "https://store-api.sikdae.com/v1/store/coupon/group?sid=019C502F-6E25-75DD-BC5F-235895CEC4BA&date=2026-04-16&page=1&pageRow=15";

        async function getStoreData() {
            try {
                // 서버에 데이터 요청 시, 헤더(headers)에 입장권(토큰)을 함께 보냅니다!
                const response = await fetch(api_url, {
                    headers: {
                        "Authorization": "Bearer vcY8HTFgT0xYVyRmu9I8fuwYJD6RCZZmoAaHDP4sZZTS1Me7kwygyLgtPBqZgz8y"
                    }
                });
                
                const data = await response.json();
                
                document.getElementById('store-card').innerHTML = `
                    <span class="tag">쿠폰 그룹 데이터 (2026-04-16 기준)</span>
                    <h1>데이터 호출 성공! 🎉</h1>
                    <p>입장권(토큰)을 제시하고 무사히 데이터를 받아왔습니다.</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('store-card').innerHTML = `
                    <p style="color:red;">데이터를 불러오는 데 실패했습니다.<br>
                    (개발자 도구(F12)의 Console 탭에서 상세 에러를 확인해 보세요.)</p>
                `;
            }
        }
        getStoreData();
    </script>
</body>
</html>
