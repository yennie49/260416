<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식당 정보 실시간 확인</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #333; font-size: 20px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; margin: 5px 0; }
        .tag { display: inline-block; background: #e1f5fe; color: #01579b; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card" id="store-card">
        <p>데이터를 불러오는 중...</p>
    </div>

    <script>
        const api_url = "https://store-api.sikdae.com/v1/store/019C502F-6E25-75DD-BC5F-235895CEC4BA";

        async function getStoreData() {
            try {
                const response = await fetch(api_url);
                const data = await response.json();
                
                document.getElementById('store-card').innerHTML = `
                    <span class="tag">식당 정보</span>
                    <h1>${data.name}</h1>
                    <p>📍 <b>주소:</b> ${data.address} ${data.addressDetail}</p>
                    <p>📞 <b>전화:</b> ${data.phone}</p>
                    <p>⏰ <b>영업시간:</b> ${data.intro}</p>
                `;
            } catch (error) {
                document.getElementById('store-card').innerHTML = `
                    <p style="color:red;">데이터를 불러오는 데 실패했습니다.<br>
                    (API 서버에서 외부 접근을 차단했을 수 있습니다.)</p>
                `;
            }
        }
        getStoreData();
    </script>
</body>
</html>
